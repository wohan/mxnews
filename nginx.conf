# MX NEWS - Nginx Configuration
# Location: /etc/nginx/sites-available/newsmx

server {
    listen 80;
    server_name newsmx.ru www.newsmx.ru newsmx.online www.newsmx.online;
    return 301 https://newsmx.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name newsmx.ru www.newsmx.ru newsmx.online www.newsmx.online;
    
    root /var/www/mxnews;
    index index.html;
    
    # SSL certificates (configured by certbot)
    ssl_certificate /etc/letsencrypt/live/newsmx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newsmx.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Try to serve static files
    try_files $uri $uri/ $uri.html =404;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    
    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    
    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 7d;
    }
    
    # Important files
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
    
    # Statistics
    location /stats/ {
        try_files $uri $uri/ =404;
    }
    
    # Logs
    access_log /var/log/nginx/mxnews_access.log;
    error_log /var/log/nginx/mxnews_error.log;
}